document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"d8f826de-a807-43cf-89d1-378cd68cdbc8\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"01fbf330-051c-4832-bd8f-3c5ffa51e1e9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"4457e80e-748f-4a20-a17c-db3e80ad1e4d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; overflow-x: hidden; }\n  #gs {\n    --bg:#0a0b0d; --surface:#101215; --inset:#08090b; --line:#24282e; --line2:#1a1d22;\n    --text:#d7dbe0; --head:#f3f5f7; --muted:#b3b9c0; --dim:#8a9098; --faint:#61666d;\n    --green:#57d98a; --red:#f26d6d; --purple:#b58be8; --amber:#e0b25e;\n    --btn-text:#08090b;\n  }\n  #gs[data-theme=\"light\"] {\n    --bg:#f5f3ec; --surface:#fbfaf5; --inset:#ece9df; --line:#dbd6ca; --line2:#e5e1d6;\n    --text:#33322d; --head:#161510; --muted:#4d4b44; --dim:#6f6d64; --faint:#949186;\n    --green:#1f9d57; --red:#c8443f; --purple:#7a4fb5; --amber:#9a6b1a;\n    --btn-text:#fbfaf5;\n  }\n  #gs a { color: var(--green); text-decoration: none; }\n  #gs a:hover { color: var(--green); opacity: 0.78; }\n  #gs code { font-family: 'JetBrains Mono', monospace; }\n  #gs ::selection { background: var(--green); color: var(--btn-text); }\n  #gs .gs-scroll::-webkit-scrollbar { height: 8px; }\n  #gs .gs-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }\n  @keyframes bsBlink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }\n  @keyframes bsRise { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }\n  @media (max-width: 920px) {\n    #gs [data-hero-grid] { grid-template-columns: 1fr !important; }\n    #gs [data-two-col] { grid-template-columns: 1fr !important; }\n    #gs [data-nav-links] { display: none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"gs\" data-theme=\"{{ theme }}\" style=\"min-height:100vh; background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; -webkit-font-smoothing:antialiased; line-height:1.6; --green:{{ accent }};\">\n\n  <!-- ===================== NAV ===================== -->\n  <nav style=\"position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:60px; background:color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--line2);\">\n    <a href=\"#top\" style=\"font-family:'JetBrains Mono',monospace; font-size:15.5px; font-weight:800; color:var(--head);\">git‑queue<span style=\"color:var(--green);\">(1)<\u002Fspan><\u002Fa>\n    <div data-nav-links=\"1\" style=\"display:flex; align-items:center; gap:26px; font-family:'JetBrains Mono',monospace; font-size:13.5px;\">\n      <a href=\"#install\" style=\"color:var(--dim);\">Install<\u002Fa>\n      <a href=\"#start\" style=\"color:var(--dim);\">Getting&nbsp;started<\u002Fa>\n      <a href=\"#reference\" style=\"color:var(--dim);\">Reference<\u002Fa>\n      <a href=\"#examples\" style=\"color:var(--dim);\">Examples<\u002Fa>\n      <a href=\"#faq\" style=\"color:var(--dim);\">FAQ<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:12px; font-family:'JetBrains Mono',monospace;\">\n      <button sc-camel-on-click=\"{{ toggleTheme }}\" title=\"Toggle theme\" style=\"cursor:pointer; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid var(--line); background:var(--surface); color:var(--dim); border-radius:8px; font-size:14px;\">{{ themeIcon }}<\u002Fbutton>\n      <a href=\"https://github.com/freshtonic/git-queue\" style=\"display:flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:var(--btn-text); background:var(--green); padding:8px 14px; border-radius:8px;\">★ GitHub<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===================== HERO ===================== -->\n  <header id=\"top\" style=\"max-width:1160px; margin:0 auto; padding:16px 32px 8px;\">\n    <div data-hero-grid=\"1\" style=\"display:grid; grid-template-columns:1.02fr 0.98fr; gap:56px; align-items:center; padding:64px 0 40px;\">\n      <div style=\"display:flex; flex-direction:column; gap:24px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--faint);\">Stacked pull requests for Git<\u002Fspan>\n        <h1 style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:50px; line-height:1.06; font-weight:800; color:var(--head); letter-spacing:-0.02em;\">Small, reviewable PRs.<br>Kept in order, automatically.<\u002Fh1>\n        <p style=\"margin:0; font-size:18px; line-height:1.62; color:var(--muted); max-width:31em;\">Split a big change into dependent branches. <span style=\"color:var(--text); font-weight:600;\">git-queue<\u002Fspan> rebases the whole stack on trunk and opens one numbered PR per branch — each targeting the one below.<\u002Fp>\n        <div style=\"display:flex; align-items:stretch; gap:10px; margin-top:2px;\">\n          <div style=\"flex:1; display:flex; align-items:center; gap:14px; background:var(--inset); border:1px solid var(--line); border-radius:10px; padding:14px 18px; font-family:'JetBrains Mono',monospace; font-size:14.5px;\">\n            <span style=\"color:var(--green);\">$<\u002Fspan><span style=\"color:var(--text);\">./install.sh<\u002Fspan>\n            <span style=\"margin-left:auto; color:var(--faint); font-size:12.5px;\">cargo&nbsp;+&nbsp;man&nbsp;page<\u002Fspan>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ cpInstall }}\" style=\"cursor:pointer; border:1px solid var(--line); background:var(--surface); color:var(--dim); border-radius:10px; padding:0 16px; font-family:'JetBrains Mono',monospace; font-size:13px; min-width:82px;\">{{ copiedInstall }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:16px; align-items:center; flex-wrap:wrap;\">\n          <a href=\"https://github.com/freshtonic/git-queue\" style=\"display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; color:var(--btn-text); background:var(--green); padding:12px 18px; border-radius:10px;\">★ Star on GitHub<\u002Fa>\n          <a href=\"#start\" style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--dim);\">Read the workflow →<\u002Fa>\n        <\u002Fdiv>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--faint);\">Single Rust binary · <code>git queue …<\u002Fcode> dispatched by Git · MIT<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- live terminal -->\n      <div style=\"background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden; box-shadow:0 40px 90px -40px rgba(0,0,0,0.55);\">\n        <div style=\"display:flex; align-items:center; gap:8px; padding:13px 18px; border-bottom:1px solid var(--line2);\">\n          <span style=\"width:11px; height:11px; border-radius:50%; background:var(--red);\"><\u002Fspan>\n          <span style=\"width:11px; height:11px; border-radius:50%; background:var(--amber);\"><\u002Fspan>\n          <span style=\"width:11px; height:11px; border-radius:50%; background:var(--green);\"><\u002Fspan>\n          <span style=\"margin-left:12px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--faint);\">~/repo — git queue<\u002Fspan>\n          <button sc-camel-on-click=\"{{ replayHero }}\" style=\"margin-left:auto; cursor:pointer; border:none; background:transparent; color:var(--faint); font-family:'JetBrains Mono',monospace; font-size:11.5px;\">▸ replay<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:22px 24px; height:360px; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; font-family:'JetBrains Mono',monospace; font-size:14px; line-height:1.9;\">{{ heroTerminal }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- how it works strip -->\n    <div data-two-col=\"1\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line2); border:1px solid var(--line2); border-radius:12px; overflow:hidden; margin:24px 0 8px;\">\n      <div style=\"background:var(--bg); padding:24px 26px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green); margin-bottom:8px;\">01 · Track order<\u002Fdiv>\n        <p style=\"margin:0; font-size:14.5px; color:var(--muted);\">Branches form a forest under trunk via parent pointers. A <em style=\"font-style:normal; color:var(--text);\">stack line<\u002Fem> is the linear chain from trunk to a leaf.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--bg); padding:24px 26px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green); margin-bottom:8px;\">02 · Restack on trunk<\u002Fdiv>\n        <p style=\"margin:0; font-size:14.5px; color:var(--muted);\">Change a lower branch and every descendant is rebased onto its new tip — so you never hand-rebase a stack.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--bg); padding:24px 26px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green); margin-bottom:8px;\">03 · One PR per branch<\u002Fdiv>\n        <p style=\"margin:0; font-size:14.5px; color:var(--muted);\"><code>submit<\u002Fcode> pushes bottom-first, targets each PR at the branch below, writes <code>[k/n]<\u002Fcode> titles and a linked stack map.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===================== INSTALL ===================== -->\n  <section id=\"install\" style=\"scroll-margin-top:80px; max-width:1160px; margin:0 auto; padding:72px 32px 24px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green);\">01<\u002Fspan>\n      <h2 style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:800; color:var(--head); letter-spacing:-0.01em;\">Install<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 28px; font-size:16px; color:var(--muted); max-width:52em;\">Lead with the full path — the binary and the man page:<\u002Fp>\n    <div data-two-col=\"1\" style=\"display:grid; grid-template-columns:1.15fr 0.85fr; gap:24px;\">\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-bottom:1px solid var(--line2); font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:0.1em;\"><span>full install<\u002Fspan><button sc-camel-on-click=\"{{ cpFull }}\" style=\"cursor:pointer; border:none; background:transparent; color:var(--dim); font-family:inherit; font-size:11px;\">{{ copiedFull }}<\u002Fbutton><\u002Fdiv>\n          <pre class=\"gs-scroll\" style=\"margin:0; padding:18px 20px; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:2.0; color:var(--text);\">{{ installFull }}<\u002Fpre>\n        <\u002Fdiv>\n        <p style=\"margin:0; font-size:15px; color:var(--muted);\"><code style=\"color:var(--text);\">install.sh<\u002Fcode> runs <code style=\"color:var(--text);\">cargo install --path .<\u002Fcode> then writes the man page onto your <code style=\"color:var(--text);\">MANPATH<\u002Fcode> — because <code>cargo install<\u002Fcode> only installs binaries. Afterwards both <code style=\"color:var(--text);\">man git-queue<\u002Fcode> and <code style=\"color:var(--text);\">git queue --help<\u002Fcode> work. Git routes <code>git queue --help<\u002Fcode> to the man page; use <code style=\"color:var(--text);\">git queue help<\u002Fcode> for inline CLI help.<\u002Fp>\n        <div style=\"background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;\">\n          <div style=\"padding:11px 16px; border-bottom:1px solid var(--line2); font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:0.1em;\">binary only<\u002Fdiv>\n          <pre style=\"margin:0; padding:16px 20px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:var(--text);\"><span style=\"color:var(--green);\">$<\u002Fspan> cargo install --path .<\u002Fpre>\n        <\u002Fdiv>\n        <p style=\"margin:0; font-size:14.5px; color:var(--dim);\">Because the binary is named <code style=\"color:var(--text);\">git-queue<\u002Fcode>, Git runs <code style=\"color:var(--text);\">git queue …<\u002Fcode> for you via its standard subcommand mechanism.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"border:1px solid var(--amber); border-radius:12px; padding:20px 22px; background:color-mix(in srgb, var(--amber) 8%, var(--surface));\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--amber); margin-bottom:10px;\">Optional · auto-restack hooks<\u002Fdiv>\n          <p style=\"margin:0 0 12px; font-size:14px; color:var(--muted);\">Per-repo. Makes plain <code>git commit<\u002Fcode>/amend auto-restack descendants.<\u002Fp>\n          <pre style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.9; color:var(--text);\"><span style=\"color:var(--green);\">$<\u002Fspan> git queue hooks install\n<span style=\"color:var(--green);\">$<\u002Fspan> git queue hooks uninstall<\u002Fpre>\n          <p style=\"margin:12px 0 0; font-size:13px; color:var(--dim);\">Without hooks, use <code>git queue commit<\u002Fcode> / <code>git queue amend<\u002Fcode> explicitly.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line); border-radius:12px; padding:20px 22px; background:var(--surface);\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--head); margin-bottom:12px;\">Requirements<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div>\n              <div style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; color:var(--green); margin-bottom:2px;\">git<\u002Fdiv>\n              <p style=\"margin:0; font-size:13.5px; color:var(--muted);\"><code>commit<\u002Fcode>/<code>sync<\u002Fcode> use <code>git replay<\u002Fcode> (≥ 2.44); <code>amend<\u002Fcode>/<code>reword<\u002Fcode> use <code>git history<\u002Fcode> (≥ 2.55). Other commands work on older git and tell you if a feature is missing.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid var(--line2); padding-top:12px;\">\n              <div style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; color:var(--green); margin-bottom:2px;\"><a href=\"https://cli.github.com\">gh<\u002Fa><\u002Fdiv>\n              <p style=\"margin:0; font-size:13.5px; color:var(--muted);\">Authenticated GitHub CLI, for <code>submit<\u002Fcode>/<code>yank<\u002Fcode>. Not needed for local-only stack operations.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:22px 0 0; font-size:13px; color:var(--faint); font-family:'JetBrains Mono',monospace;\">// The man page is generated from the CLI definition (clap_mangen) so it never drifts — regenerate with <code style=\"color:var(--dim);\">git-queue man --dir &lt;man1-dir&gt;<\u002Fcode>.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===================== GETTING STARTED ===================== -->\n  <section id=\"start\" style=\"scroll-margin-top:80px; max-width:1160px; margin:0 auto; padding:72px 32px 24px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green);\">02<\u002Fspan>\n      <h2 style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:800; color:var(--head); letter-spacing:-0.01em;\">Getting started<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 28px; font-size:16px; color:var(--muted); max-width:52em;\">The core workflow. Build a stack branch-by-branch, submit numbered PRs, and keep everything rebased as trunk moves.<\u002Fp>\n    <div data-two-col=\"1\" style=\"display:grid; grid-template-columns:1fr 0.62fr; gap:24px; align-items:start;\">\n      <div style=\"background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;\">\n        <div style=\"padding:11px 16px; border-bottom:1px solid var(--line2); font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:0.1em;\">core workflow<\u002Fdiv>\n        <pre class=\"gs-scroll\" style=\"margin:0; padding:20px 22px; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.95; color:var(--text);\">{{ workflow }}<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"background:var(--inset); border:1px solid var(--line); border-radius:12px; padding:20px 22px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:14px;\">the stack, at any point<\u002Fdiv>\n        <pre style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:15px; line-height:2.05; color:var(--dim);\">{{ diagStatic }}<\u002Fpre>\n        <p style=\"margin:16px 0 0; font-size:13px; color:var(--muted);\"><code style=\"color:var(--text);\">◉<\u002Fcode> current branch · <code style=\"color:var(--text);\">◯<\u002Fcode> tracked · bottom merges into trunk first.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"margin:40px 0 6px; font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:800; color:var(--head);\">The one distinction that matters most<\u002Fh3>\n    <p style=\"margin:0 0 20px; font-size:15px; color:var(--muted);\"><code style=\"color:var(--text);\">commit<\u002Fcode> vs <code style=\"color:var(--text);\">amend<\u002Fcode>. Learn this pair and the rest follows.<\u002Fp>\n    <div data-two-col=\"1\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px;\">\n      <div style=\"border:1px solid var(--line); border-radius:12px; padding:22px 24px; background:var(--surface);\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:800; color:var(--head); margin-bottom:6px;\">git queue commit<\u002Fdiv>\n        <p style=\"margin:0; font-size:14.5px; color:var(--muted);\">Adds a <strong style=\"color:var(--text); font-weight:600;\">new<\u002Fstrong> commit — new work — then restacks all descendants onto the new tip.<\u002Fp>\n        <div style=\"margin-top:14px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--faint);\">engine · <code style=\"color:var(--dim);\">git replay<\u002Fcode><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid var(--green); border-radius:12px; padding:22px 24px; background:color-mix(in srgb, var(--green) 7%, var(--surface));\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:800; color:var(--head); margin-bottom:6px;\">git queue amend<\u002Fdiv>\n        <p style=\"margin:0; font-size:14.5px; color:var(--muted);\">Folds <strong style=\"color:var(--text); font-weight:600;\">staged<\u002Fstrong> changes into the branch's tip commit and updates descendants — like <code>commit --amend<\u002Fcode>, stack-aware. The everyday tool for review feedback on a lower PR.<\u002Fp>\n        <div style=\"margin-top:14px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--faint);\">engine · <code style=\"color:var(--dim);\">git history fixup<\u002Fcode><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px; display:flex; gap:16px; align-items:flex-start; border:1px solid var(--red); border-radius:12px; padding:20px 24px; background:color-mix(in srgb, var(--red) 8%, var(--surface));\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:22px; color:var(--red); line-height:1.2;\">✗<\u002Fspan>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:800; color:var(--head); margin-bottom:4px;\">The golden rule — don't hand-rebase a stack.<\u002Fdiv>\n        <p style=\"margin:0; font-size:14.5px; color:var(--muted);\">When you change a branch that has descendants, use the git-queue command for it so the change propagates to every branch above (forks included). Running <code style=\"color:var(--text);\">git rebase<\u002Fcode> on a tracked branch detaches its children.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== COMMAND REFERENCE ===================== -->\n  <section id=\"reference\" style=\"scroll-margin-top:80px; max-width:1160px; margin:0 auto; padding:72px 32px 24px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green);\">03<\u002Fspan>\n      <h2 style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:800; color:var(--head); letter-spacing:-0.01em;\">Command reference<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 20px; font-size:16px; color:var(--muted); max-width:52em;\">The full command set, grouped by task. Filter to find one fast.<\u002Fp>\n    <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:22px; max-width:440px;\">\n      <div style=\"flex:1; display:flex; align-items:center; gap:10px; background:var(--inset); border:1px solid var(--line); border-radius:10px; padding:10px 14px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; color:var(--faint);\">/<\u002Fspan>\n        <input value=\"{{ query }}\" sc-camel-on-input=\"{{ onQuery }}\" placeholder=\"filter commands…\" style=\"flex:1; border:none; outline:none; background:transparent; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--faint);\">{{ matchCount }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ groups }}\" as=\"group\" hint-placeholder-count=\"5\">\n      <sc-if value=\"{{ group.visible }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-bottom:26px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--green); margin-bottom:10px;\">{{ group.name }}<\u002Fdiv>\n          <div class=\"gs-scroll\" style=\"border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--surface);\">\n            <sc-for list=\"{{ group.items }}\" as=\"cmd\" hint-placeholder-count=\"4\">\n              <div data-two-col=\"1\" style=\"display:grid; grid-template-columns:0.9fr 1.1fr; gap:20px; padding:14px 20px; border-top:1px solid var(--line2); align-items:baseline;\">\n                <code style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; color:var(--text); white-space:pre-wrap;\">git queue {{ cmd.name }}<\u002Fcode>\n                <span style=\"font-size:14px; color:var(--muted);\">{{ cmd.desc }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-for>\n    <p style=\"margin:6px 0 0; font-size:13px; color:var(--faint); font-family:'JetBrains Mono',monospace;\">// Help quirk: <code style=\"color:var(--dim);\">git queue &lt;cmd&gt; --help<\u002Fcode> is intercepted by Git and opens the man page — use <code style=\"color:var(--dim);\">git queue help<\u002Fcode> for inline CLI help.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===================== EXAMPLES ===================== -->\n  <section id=\"examples\" style=\"scroll-margin-top:80px; max-width:1160px; margin:0 auto; padding:72px 32px 24px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green);\">04<\u002Fspan>\n      <h2 style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:800; color:var(--head); letter-spacing:-0.01em;\">Realistic examples<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 22px; font-size:16px; color:var(--muted); max-width:52em;\">Three worked, end-to-end sessions — each paired with the PR-body stack map git-queue generates.<\u002Fp>\n    <div style=\"display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;\">\n      <button sc-camel-on-click=\"{{ pickA }}\" style=\"{{ tabAStyle }}\">A · Build &amp; ship a 3-PR stack<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ pickB }}\" style=\"{{ tabBStyle }}\">B · Address review feedback<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ pickC }}\" style=\"{{ tabCStyle }}\">C · Split a big branch<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"margin-bottom:18px;\"><p style=\"margin:0; font-size:15px; color:var(--muted);\">{{ exBlurb }}<\u002Fp><\u002Fdiv>\n    <div data-two-col=\"1\" style=\"display:grid; grid-template-columns:1.05fr 0.95fr; gap:24px; align-items:start;\">\n      <div style=\"background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;\">\n        <div style=\"padding:11px 16px; border-bottom:1px solid var(--line2); font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:0.1em;\">session<\u002Fdiv>\n        <pre class=\"gs-scroll\" style=\"margin:0; padding:20px 22px; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.95; color:var(--text);\">{{ exSession }}<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"background:var(--inset); border:1px solid var(--line); border-radius:12px; overflow:hidden;\">\n        <div style=\"padding:11px 16px; border-bottom:1px solid var(--line2); font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:0.1em;\">generated PR-body stack map<\u002Fdiv>\n        <div style=\"padding:22px 24px; font-size:14px;\" sc-camel-dangerously-set-inner-h-t-m-l=\"{{ exMap }}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FAQ ===================== -->\n  <section id=\"faq\" style=\"scroll-margin-top:80px; max-width:900px; margin:0 auto; padding:72px 32px 24px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px; margin-bottom:24px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--green);\">05<\u002Fspan>\n      <h2 style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:800; color:var(--head); letter-spacing:-0.01em;\">FAQ<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--surface);\">\n      <sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <div style=\"border-top:1px solid var(--line2);\">\n          <button sc-camel-on-click=\"{{ item.toggle }}\" style=\"width:100%; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 22px; border:none; background:transparent; text-align:left; font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:600; color:var(--head);\">\n            <span>{{ item.q }}<\u002Fspan>\n            <span style=\"color:var(--green); font-size:16px; flex-shrink:0;\">{{ item.sign }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 22px 20px; font-size:15px; line-height:1.68; color:var(--muted);\" sc-camel-dangerously-set-inner-h-t-m-l=\"{{ item.answer }}\"><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"border-top:1px solid var(--line2); margin-top:48px;\">\n    <div data-two-col=\"1\" style=\"max-width:1160px; margin:0 auto; padding:44px 32px; display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:32px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:15.5px; font-weight:800; color:var(--head);\">git‑queue<span style=\"color:var(--green);\">(1)<\u002Fspan><\u002Fdiv>\n        <p style=\"margin:10px 0 0; font-size:14px; color:var(--dim); max-width:32em;\">Stacks of dependent branches and their numbered pull requests. A single Rust binary — state lives entirely in your repo's git config.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:10px; font-family:'JetBrains Mono',monospace; font-size:13.5px;\">\n        <span style=\"color:var(--faint); text-transform:uppercase; letter-spacing:0.1em; font-size:11.5px;\">Project<\u002Fspan>\n        <a href=\"https://github.com/freshtonic/git-queue\">GitHub repo ↗<\u002Fa>\n        <a href=\"https://github.com/freshtonic/git-queue/blob/main/DESIGN.md\">DESIGN.md ↗<\u002Fa>\n        <a href=\"https://github.com/freshtonic/git-queue/blob/main/skills/using-git-queue/SKILL.md\">Claude skill ↗<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:10px; font-family:'JetBrains Mono',monospace; font-size:13.5px;\">\n        <span style=\"color:var(--faint); text-transform:uppercase; letter-spacing:0.1em; font-size:11.5px;\">On this page<\u002Fspan>\n        <a href=\"#install\" style=\"color:var(--dim);\">Install<\u002Fa>\n        <a href=\"#start\" style=\"color:var(--dim);\">Getting started<\u002Fa>\n        <a href=\"#reference\" style=\"color:var(--dim);\">Command reference<\u002Fa>\n        <a href=\"#examples\" style=\"color:var(--dim);\">Examples<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid var(--line2);\">\n      <div style=\"max-width:1160px; margin:0 auto; padding:18px 32px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--faint);\">\n        <span>There's a Claude Code skill (<code style=\"color:var(--dim);\">skills/using-git-queue/SKILL.md<\u002Fcode>) that teaches Claude to drive <code style=\"color:var(--dim);\">git queue<\u002Fcode>.<\u002Fspan>\n        <span>MIT · <code>git-queue<\u002Fcode><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#57d98a&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#57d98a&quot;,&quot;#e0b25e&quot;,&quot;#b58be8&quot;,&quot;#5ac8d9&quot;],&quot;section&quot;:&quot;Theme&quot;},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;heroMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;},&quot;motionSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.5,&quot;max&quot;:2,&quot;step&quot;:0.25,&quot;unit&quot;:&quot;\\u00d7&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  state = { theme: \"dark\", frame: 1, query: \"\", example: \"A\", copied: \"\", faqOpen: 0 };\n\n  componentDidMount() {\n    this.setState({ theme: this.props.defaultTheme || \"dark\" });\n    if (this.props.heroMotion === false) this.setState({ frame: this.heroLines().length });\n    else this.tick();\n  }\n  componentDidUpdate(prev) {\n    if (prev.defaultTheme !== this.props.defaultTheme && this.props.defaultTheme) {\n      this.setState({ theme: this.props.defaultTheme });\n    }\n    if (prev.heroMotion !== this.props.heroMotion) {\n      clearTimeout(this._t);\n      if (this.props.heroMotion === false) this.setState({ frame: this.heroLines().length });\n      else this.setState({ frame: 1 }, () => this.tick());\n    }\n  }\n  componentWillUnmount() { clearTimeout(this._t); }\n\n  heroLines() {\n    const D = (l) => ({ k: \"diag\", t: l });\n    return [\n      { k: \"cmd\", t: \"git queue init\" },\n      { k: \"cmd\", t: \"git queue create api\" },\n      { k: \"cmd\", t: \"git queue create service\" },\n      { k: \"cmd\", t: \"git queue create ui\" },\n      D(\"\\u25c9 ui        (local)   \\u2190 current\\n\\u25ef service   (local)\\n\\u25ef api       (local)\\n\\u2534\\n  main (trunk)\"),\n      { k: \"cmd\", t: \"git queue submit\" },\n      { k: \"note\", t: \"\\u2713 pushed 3 branches \\u00b7 opened #10 #11 #12, cross-linked\" },\n      D(\"\\u25c9 ui        #12 [OPEN]   \\u2190 current\\n\\u25ef service   #11 [OPEN]\\n\\u25ef api       #10 [OPEN]\\n\\u2534\\n  main (trunk)\"),\n      { k: \"note\", t: \"\\u2713 #10 api merged into main\" },\n      { k: \"cmd\", t: \"git queue sync\" },\n      D(\"\\u25c9 ui        #12 [OPEN]   \\u2190 current\\n\\u25ef service   #11 [OPEN]  \\u2192 main\\n\\u2534\\n  main (trunk)\"),\n    ];\n  }\n\n  tick() {\n    if (this.props.heroMotion === false) return;\n    const lines = this.heroLines();\n    const speed = this.props.motionSpeed || 1;\n    if (this.state.frame >= lines.length) {\n      this._t = setTimeout(() => this.setState({ frame: 1 }, () => this.tick()), 3400 / speed);\n    } else {\n      const cur = lines[this.state.frame - 1];\n      const delay = (cur && cur.k === \"diag\" ? 1400 : 900) / speed;\n      this._t = setTimeout(() => this.setState({ frame: this.state.frame + 1 }, () => this.tick()), delay);\n    }\n  }\n\n  copy(text) {\n    try { navigator.clipboard && navigator.clipboard.writeText(text); } catch (e) {}\n    this.setState({ copied: text });\n    setTimeout(() => { if (this.state.copied === text) this.setState({ copied: \"\" }); }, 1400);\n  }\n\n  commandGroups() {\n    return [\n      { name: \"Setup\", items: [\n        { name: \"init [--trunk <b>]\", desc: \"Record the trunk branch for this repo.\" },\n        { name: \"create <name>\", desc: \"Create <name> on top of the current branch and track it.\" },\n        { name: \"split\", desc: \"Split the current branch's commits into a stack (editor assigns commits to branches).\" },\n        { name: \"track [--parent <b>]\", desc: \"Adopt the current branch into a stack (parent defaults to trunk).\" },\n        { name: \"untrack\", desc: \"Forget the current branch's stack metadata.\" },\n      ]},\n      { name: \"Navigate & inspect\", items: [\n        { name: \"status  (ls, list)\", desc: \"Show the stack tree with PR numbers and states.\" },\n        { name: \"up  (next)\", desc: \"Check out the child branch.\" },\n        { name: \"down  (prev)\", desc: \"Check out the parent branch.\" },\n      ]},\n      { name: \"Edit\", items: [\n        { name: \"commit [-m <msg>]\", desc: \"New commit on the current branch, then restack all descendants onto the new tip.\" },\n        { name: \"amend\", desc: \"Fold staged changes into the current commit and update every descendant.\" },\n        { name: \"reword [<commit>]\", desc: \"Rewrite a commit message and update descendants (defaults to HEAD).\" },\n        { name: \"restack\", desc: \"Restack the current branch's descendants onto its tip.\" },\n        { name: \"hooks install / uninstall\", desc: \"Make plain git commit / amend auto-restack descendants.\" },\n        { name: \"describe [-m <text>]\", desc: \"Describe the branch/PR; becomes the PR body (opens $EDITOR without -m).\" },\n      ]},\n      { name: \"Remote & PRs\", items: [\n        { name: \"sync [--no-push]\", desc: \"Pull remote, drop merged-PR branches (reparenting children), restack onto trunk, push with --force-with-lease.\" },\n        { name: \"submit [--draft]  (push)\", desc: \"Push the current stack line and open/update its numbered PRs (revives a child PR GitHub closed when its base was deleted).\" },\n        { name: \"yank\", desc: \"Close every open (non-merged) PR in the current stack.\" },\n      ]},\n      { name: \"Merge-order\", items: [\n        { name: \"protect\", desc: \"Enable merge-order signalling (a red/green commit status per PR) for this repo.\" },\n        { name: \"doctor\", desc: \"Report whether merge-order signalling is enabled (read-only).\" },\n      ]},\n    ];\n  }\n\n  examples() {\n    return {\n      A: {\n        blurb: \"Build a three-branch stack from trunk, describe the bottom PR, and open all three cross-linked PRs in one submit.\",\n        session: \"$ git queue init                 # record trunk (auto-detects main/master)\\n\\n$ git checkout main\\n$ git queue create types         # bottom of the stack\\n#   \\u2026edit, then:\\n$ git queue commit -m \\\"Add domain types\\\"\\n$ git queue describe -m \\\"Introduces the core domain types shared by the stack.\\\"\\n\\n$ git queue create service\\n$ git queue commit -m \\\"Add service layer\\\"\\n\\n$ git queue create api\\n$ git queue commit -m \\\"Expose HTTP API\\\"\\n\\n$ git queue status               # see the three-branch stack\\n$ git queue submit               # opens PRs #1/3, #2/3, #3/3, cross-linked\",\n        map: this.prMap(1),\n      },\n      B: {\n        blurb: \"Revise the bottom PR after review. amend rewrites its tip commit and auto-updates the branches above; sync catches up when trunk advances.\",\n        session: \"$ git queue down                 # \\u2192 down to `types`\\n#   \\u2026edit\\u2026\\n$ git add -A && git queue amend   # revise the commit; service+api auto-update\\n$ git queue submit               # refresh all three PRs\\n\\n# Trunk advanced / teammate pushed:\\n$ git queue sync                 # pull + restack + push (with lease)\",\n        map: this.prMap(1),\n      },\n      C: {\n        blurb: \"Turn one big branch into a reviewable stack. The editor lets you prefix each commit with a branch name; submit opens the PRs.\",\n        session: \"$ git checkout big-feature\\n$ git queue split                # editor: prefix each commit with a branch name\\n#   e.g.  api  <sha> Add API\\n#         api  <sha> Add client\\n#         ui   <sha> Add UI\\n$ git queue submit\",\n        map: this.prMap(2),\n      },\n    };\n  }\n\n  prMap(current) {\n    const row = (n, num, name, base, glyph, isThis) => {\n      const label = isThis\n        ? \"<strong style=\\\"color:var(--head)\\\">[#\" + num + \" <code>\" + name + \"<\u002Fcode>](\\u2026) \\u2192 <code>\" + base + \"<\u002Fcode><\u002Fstrong>  \\ud83d\\udc48 <strong style=\\\"color:var(--head)\\\">this PR<\u002Fstrong>\"\n        : \"[#\" + num + \" <code>\" + name + \"<\u002Fcode>](\\u2026) \\u2192 <code>\" + base + \"<\u002Fcode>\";\n      return \"<div style=\\\"display:flex; gap:10px; padding:4px 0;\\\"><span style=\\\"color:var(--faint)\\\">\" + n + \".<\u002Fspan><span>\" + glyph + \" \" + label + \"<\u002Fspan><\u002Fdiv>\";\n    };\n    return { __html:\n      \"<div style=\\\"font-family:'JetBrains Mono',monospace; font-size:13.5px; color:var(--text);\\\">\"\n      + \"<div style=\\\"font-weight:800; color:var(--head); margin-bottom:8px;\\\">\\ud83d\\udcda Stacked PR \\u00b7 \" + (current + 1) + \" of 3<\u002Fdiv>\"\n      + \"<p style=\\\"margin:0 0 14px; color:var(--muted); font-family:'IBM Plex Sans',sans-serif; font-size:13.5px;\\\">Part of a stack. The PRs merge in FIFO order \\u2014 the numbered order below, #1 first.<\u002Fp>\"\n      + row(1, 10, \"api\", \"main\", \"\\ud83d\\udfe3\", current === 0)\n      + row(2, 11, \"service\", \"api\", \"\\u267b\\ufe0f\\ud83d\\udfe2\", current === 1)\n      + row(3, 12, \"ui\", \"service\", \"\\u23f3\\ud83d\\udfe2\", current === 2)\n      + \"<div style=\\\"border-top:1px solid var(--line2); margin:14px 0;\\\"><\u002Fdiv>\"\n      + \"<div style=\\\"color:var(--faint); font-style:italic;\\\">&lt;your <code>git queue describe<\u002Fcode> text&gt;<\u002Fdiv>\"\n      + \"<\u002Fdiv>\"\n    };\n  }\n\n  faqData() {\n    return [\n      { q: \"In what order do the PRs merge?\", a: \"FIFO \\u2014 the oldest PR (<code>#1<\u002Fcode>, base of the stack) merges first, then the next. After a PR lands, run <code>git queue sync<\u002Fcode> (detects the merge, reparents branches above onto trunk, rebases them), then <code>git queue submit<\u002Fcode> (retargets PR bases, refreshes the list).\" },\n      { q: \"Can git-queue stop people merging out of order?\", a: \"Yes \\u2014 <code>git queue protect<\u002Fcode> (once per repo) enables a <code>git-queue/merge-order<\u002Fcode> commit status on every open PR: green <span style=\\\"color:var(--green)\\\">\\u2713<\u002Fspan> on the bottom mergeable PR, red <span style=\\\"color:var(--red)\\\">\\u2717<\u002Fspan> (\\u201cmerge PR #N first\\u201d) on every PR above it, linking to the PR that must land first. It's <em>advisory<\u002Fem> \\u2014 the red \\u2717 shows in the checks list but doesn't disable the merge button; PRs stay normal, reviewable, non-draft. <code>git queue doctor<\u002Fcode> reports whether it's on.\" },\n      { q: \"Why a commit status instead of actually blocking the merge?\", a: \"Every hard block GitHub offers lives on the <em>base<\u002Fem> branch's rules. With base-chaining, a non-bottom PR targets an intermediate stack branch \\u2014 so a ruleset that gates the merge also rejects git-queue's own pushes to that branch. Draft PRs (the one PR-level block) read socially as \\u201cnot ready for review.\\u201d A commit status is the strongest signal that keeps PRs normal and pushes unblocked.\" },\n      { q: \"What happens when a commit in the middle of the stack conflicts?\", a: \"Depends on the operation. <code>commit<\u002Fcode>/<code>restack<\u002Fcode>/<code>sync<\u002Fcode> (engine <code>git replay<\u002Fcode>) always finish \\u2014 on conflict they <strong style=\\\"color:var(--text)\\\">persist the conflict markers into the committed files<\u002Fstrong> and flag the affected branches (shown as <code>\\u26a0 conflict markers<\u002Fcode> in <code>git queue status<\u002Fcode>). <code>amend<\u002Fcode>/<code>reword<\u002Fcode> (engine <code>git history<\u002Fcode>) are <strong style=\\\"color:var(--text)\\\">atomic<\u002Fstrong> \\u2014 on conflict they abort and change nothing. When you see markers: go to each flagged branch, search for <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;<\u002Fcode>, resolve, and <code>git queue amend<\u002Fcode>. Never <code>submit<\u002Fcode> a branch that still has markers.\" },\n      { q: \"What if the merged branch gets deleted?\", a: \"Handled. If a merge deletes the branch (<code>--delete-branch<\u002Fcode> or repo auto-delete), <code>sync<\u002Fcode> reparents orphaned children onto trunk, and because GitHub closes a PR whose base was deleted, <code>submit<\u002Fcode> revives that child PR \\u2014 reopening it or opening a fresh one retargeted to trunk.\" },\n      { q: \"Is my work safe from clobbering teammates?\", a: \"<code>git queue sync<\u002Fcode> pushes with <code>--force-with-lease<\u002Fcode>, so it won't overwrite commits pushed after your last fetch. If a push is rejected, run <code>sync<\u002Fcode> again to pull their work in first. Use <code>git queue sync --no-push<\u002Fcode> to restack locally without touching the remote. git-queue never edits trunk's commits.\" },\n      { q: \"Where does git-queue store its state?\", a: \"Entirely in the repo's own git config \\u2014 nothing outside git. Keys: <code>queue.trunk<\u002Fcode>, <code>queue.remote<\u002Fcode>, <code>branch.&lt;n&gt;.queueParent<\u002Fcode>, <code>branch.&lt;n&gt;.queueParentSha<\u002Fcode>, <code>branch.&lt;n&gt;.queuePr<\u002Fcode>, <code>branch.&lt;n&gt;.queueDescription<\u002Fcode>, <code>queue.gate<\u002Fcode>. Inspect with <code>git config --get-regexp '^branch\\\\..*\\\\.queue'<\u002Fcode>. Conflict-marker state is <em>not<\u002Fem> stored \\u2014 <code>status<\u002Fcode> detects <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;<\u002Fcode> live, so it's never stale.\" },\n      { q: \"Do I have to use git queue commit instead of git commit?\", a: \"No \\u2014 run <code>git queue hooks install<\u002Fcode> and a post-commit / post-rewrite hook calls <code>git queue restack<\u002Fcode> for you after plain <code>git commit<\u002Fcode> / <code>git commit --amend<\u002Fcode>. The hooks are guarded against recursion and no-op off a stack.\" },\n      { q: \"Why does git queue --help open a man page?\", a: \"Git intercepts <code>--help<\u002Fcode> on subcommands and routes it to <code>man git-queue<\u002Fcode>. Install via <code>./install.sh<\u002Fcode> so that page exists; otherwise use <code>git queue help<\u002Fcode> or <code>git-queue --help<\u002Fcode> for inline help.\" },\n    ];\n  }\n\n  renderVals() {\n    const R = React.createElement;\n    const lines = this.heroLines();\n    const visible = lines.slice(0, this.state.frame);\n    const cvar = (n) => ({ get [Symbol.toPrimitive]() { return \"var(--\" + n + \")\"; } });\n    const lineEl = (ln, i) => {\n      const base = { key: i, style: { animation: \"bsRise .4s both\" } };\n      if (ln.k === \"cmd\") return R(\"div\", base, R(\"span\", { style: { color: \"var(--green)\", marginRight: \"8px\" } }, \"$\"), R(\"span\", { style: { color: \"var(--text)\" } }, ln.t));\n      if (ln.k === \"note\") return R(\"div\", { key: i, style: { color: \"var(--dim)\", animation: \"bsRise .4s both\", margin: \"2px 0\" } }, ln.t);\n      return R(\"pre\", { key: i, style: { margin: \"8px 0\", color: \"var(--dim)\", lineHeight: 1.9, animation: \"bsRise .5s both\", fontFamily: \"'JetBrains Mono',monospace\" } }, ln.t);\n    };\n    const heroTerminal = R(\"div\", { style: { display: \"flex\", flexDirection: \"column\", gap: \"1px\" } },\n      visible.map(lineEl),\n      R(\"span\", { key: \"cur\", style: { display: \"inline-block\", width: \"8px\", height: \"16px\", background: \"var(--green)\", verticalAlign: \"middle\", marginTop: \"6px\", animation: \"bsBlink 1.1s steps(1) infinite\" } })\n    );\n\n    const q = this.state.query.trim().toLowerCase();\n    let count = 0;\n    const groups = this.commandGroups().map((g) => {\n      const items = g.items.filter((it) => !q || (\"git queue \" + it.name + \" \" + it.desc).toLowerCase().includes(q));\n      count += items.length;\n      return { name: g.name, items, visible: items.length > 0 };\n    });\n\n    const ex = this.examples()[this.state.example];\n    const tabStyle = (id) => {\n      const on = this.state.example === id;\n      return \"cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; padding:9px 15px; border-radius:9px; border:1px solid \" +\n        (on ? \"var(--green)\" : \"var(--line)\") + \"; background:\" + (on ? \"color-mix(in srgb, var(--green) 12%, var(--surface))\" : \"var(--surface)\") +\n        \"; color:\" + (on ? \"var(--head)\" : \"var(--dim)\") + \";\";\n    };\n\n    const faqs = this.faqData().map((f, i) => ({\n      q: f.q,\n      answer: { __html: f.a },\n      open: this.state.faqOpen === i,\n      sign: this.state.faqOpen === i ? \"\\u2212\" : \"+\",\n      toggle: () => this.setState({ faqOpen: this.state.faqOpen === i ? -1 : i }),\n    }));\n\n    return {\n      theme: this.state.theme,\n      accent: this.props.accent || \"#57d98a\",\n      themeIcon: this.state.theme === \"dark\" ? \"\\u25d1\" : \"\\u25d0\",\n      toggleTheme: () => this.setState({ theme: this.state.theme === \"dark\" ? \"light\" : \"dark\" }),\n      heroTerminal,\n      replayHero: () => { clearTimeout(this._t); this.setState({ frame: 1 }, () => this.tick()); },\n      cpInstall: () => this.copy(\"./install.sh\"),\n      copiedInstall: this.state.copied === \"./install.sh\" ? \"copied \\u2713\" : \"copy\",\n      cpFull: () => this.copy(\"git clone git@github.com:freshtonic/git-queue.git\\ncd git-queue\\n./install.sh\\ngit queue --version\"),\n      copiedFull: this.state.copied.indexOf(\"git clone\") === 0 ? \"copied \\u2713\" : \"copy\",\n      installFull: \"$ git clone git@github.com:freshtonic/git-queue.git\\n$ cd git-queue\\n$ ./install.sh          # cargo install (the binary) + install the man page\\n$ git queue --version\",\n      workflow: \"$ git queue init                 # record the trunk (auto-detects main/master)\\n\\n$ git checkout main\\n$ git queue create api           # new branch on trunk; make commits\\n$ git queue create service       # new branch on top of `api`\\n$ git queue create ui            # new branch on top of `service`\\n\\n$ git queue status               # view the stack and PR states\\n$ git queue down / up            # walk the stack (aliases: prev/next)\\n\\n$ git queue submit               # push all branches + open/update numbered PRs\\n#  \\u2026 trunk moves, a teammate pushes, or you amend a lower branch \\u2026\\n$ git queue sync                 # pull remote, restack onto trunk, push (with lease)\\n$ git queue submit               # refresh the PRs\",\n      diagStatic: \"\\u25c9 ui        #12 [OPEN]\\n\\u25ef service   #11 [OPEN]\\n\\u25ef api       #10 [OPEN]\\n\\u2534\\n  main (trunk)\",\n      query: this.state.query,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      matchCount: count + (count === 1 ? \" cmd\" : \" cmds\"),\n      groups,\n      pickA: () => this.setState({ example: \"A\" }),\n      pickB: () => this.setState({ example: \"B\" }),\n      pickC: () => this.setState({ example: \"C\" }),\n      tabAStyle: tabStyle(\"A\"),\n      tabBStyle: tabStyle(\"B\"),\n      tabCStyle: tabStyle(\"C\"),\n      exBlurb: ex.blurb,\n      exSession: ex.session,\n      exMap: ex.map,\n      faqs,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
